<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Form Validation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <h1>SmartLearn Portal</h1>
        <p>Participant: MALENI</p>
    </header>

    <main class="container">
        <h2>Account Creation</h2>
        <p class="subtitle">Secure Client-Side Input Form Validation</p>

        <form id="registrationForm" novalidate>
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username (min 5 characters)">
                <div class="error-message" id="usernameError">Username must be at least 5 characters long.</div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="example@domain.com">
                <div class="error-message" id="emailError">Please enter a valid email address.</div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter secure password (min 8 characters)">
                <div class="error-message" id="passwordError">Password must be at least 8 characters long.</div>
            </div>

            <div class="success-banner" id="successBanner">
                🎉 Registration form validation passed successfully!
            </div>

            <button type="submit" id="submitBtn">Register Account</button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
