<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Persistence Toggle</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="theme-card">
        <header class="card-header">
            <h1>Workspace Theme Console</h1>
            <p>Participant: MALENI</p>
        </header>

        <section class="card-body">
            <p>This workspace utilizes the browser's <code>localStorage</code> cache matrix to permanently persist theme parameters across window reboots and state updates.</p>
            
            <div class="toggle-container">
                <span class="mode-label" id="modeLabel">Light Mode Active</span>
                <button type="button" id="themeToggleBtn" class="toggle-btn">Switch Theme</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
