<app-header siteName="Student Portal"></app-header>

<h2>Course List</h2>

<input
type="text"
placeholder="Search Course"
[(ngModel)]="searchTerm">

<div *ngIf="loading">
Loading Courses...
</div>

<div *ngIf="!loading">

<div *ngFor="let course of courses">

<app-course-card

[name]="course.name"

[code]="course.code"

[credits]="course.credits"

[grade]="course.grade">

</app-course-card>

</div>

</div>
