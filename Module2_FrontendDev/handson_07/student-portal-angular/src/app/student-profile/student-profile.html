<h2>Student Profile</h2>

<form
[formGroup]="profileForm"
(ngSubmit)="submit()">

<label>Name</label>

<input
type="text"
formControlName="name">

<br><br>

<label>Email</label>

<input
type="email"
formControlName="email">

<br><br>

<label>Semester</label>

<input
type="number"
formControlName="semester">

<br><br>

<button
type="submit"
[disabled]="profileForm.invalid">

Submit

</button>

</form>
