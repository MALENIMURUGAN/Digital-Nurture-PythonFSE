<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - API User Directory</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <h1>SmartLearn Portal</h1>
        <p>Participant: MALENI</p>
    </header>

    <main class="container">
        <h2>Asynchronous User Directory</h2>
        <p class="subtitle">Real-Time REST API Data Fetching (`async/await` Pipeline)</p>

        <div class="action-center">
            <button type="button" id="fetchUsersBtn">Load User Profiles</button>
        </div>

        <div id="loadingIndicator" class="loading-spinner">Fetching profiles from API gateway...</div>

        <div id="userGrid" class="user-cards-grid">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
