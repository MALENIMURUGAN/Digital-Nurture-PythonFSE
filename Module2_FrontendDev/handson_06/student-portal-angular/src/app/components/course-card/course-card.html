<div class="course-card">

  <h3>{{ course.name }}</h3>

  <p>
    <strong>Code:</strong>
    {{ course.code }}
  </p>

  <p>
    <strong>Credits:</strong>
    {{ course.credits }}
  </p>

  <p>
    <strong>Grade:</strong>
    {{ course.grade }}
  </p>

  <button (click)="enrollCourse()">
    Enroll
  </button>

</div>
