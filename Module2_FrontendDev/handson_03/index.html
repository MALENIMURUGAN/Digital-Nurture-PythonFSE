<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - HandsOn 3</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h1 class="logo">Student Portal</h1>

        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">Profile</a></li>
                <li><a href="#">Grades</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section id="hero">
            <h1>Welcome to the Student Portal</h1>

            <p>
                Explore your enrolled courses and academic progress.
            </p>

            <button>Explore Courses</button>
        </section>

        <section id="courses">

            <h2>Available Courses</h2>

            <!-- Step 40 -->
            <input
                type="text"
                id="search-courses"
                placeholder="Search courses..."
            >

            <!-- Step 42 -->
            <button id="sort-btn">
                Sort by Credits
            </button>

            <!-- Step 35 -->
            <div class="course-grid">

            </div>

            <!-- Step 39 -->
            <p id="total-credits"></p>

            <!-- Step 43 -->
            <div id="selected-course"></div>

        </section>

    </main>

    <footer>

        <p>
            © 2026 Student Portal
        </p>

    </footer>

    <script type="module" src="app.js"></script>

</body>

</html>
