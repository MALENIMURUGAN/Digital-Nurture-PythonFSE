<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Grade Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <h1>SmartLearn Portal</h1>
        <p>Participant: MALENI</p>
    </header>

    <main class="container">
        <h2>Academic Grade Report</h2>
        <p class="subtitle">Dynamic DOM Management System</p>

        <div class="table-responsive">
            <table id="gradesTable">
                <thead>
                    <tr>
                        <th>Course Code</th>
                        <th>Course Name</th>
                        <th>Marks Obtained</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>

        <div class="summary-box">
            <p>Average Marks: <span id="avgMarks">0.0</span></p>
            <p>Overall Result: <span id="finalResult">-</span></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
