<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - HandsOn 4</title>

    <link rel="stylesheet" href="styles.css">

    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>

    <header>
        <h1>Student Portal</h1>

        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">Profile</a></li>
                <li><a href="#">Grades</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section id="courses">

            <h2>Courses</h2>

            <!-- Loading message -->
            <p id="loading">Loading courses...</p>

            <!-- Course cards will be rendered here -->
            <div class="course-grid"></div>

        </section>

        <section id="notifications">

            <h2>Notifications</h2>

            <!-- Loading spinner/text -->
            <p id="notification-loading">Loading notifications...</p>

            <!-- Notifications -->
            <div id="notification-list"></div>

            <!-- Error message -->
            <p id="error-message"></p>

            <!-- Retry Button -->
            <button id="retry-btn" style="display:none;">
                Retry
            </button>

        </section>

    </main>

    <footer>

        <p>© 2026 Student Portal</p>

    </footer>

    <script type="module" src="app.js"></script>

</body>

</html>
