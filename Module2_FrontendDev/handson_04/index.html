<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Assignment Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <h1>SmartLearn Portal</h1>
        <p>Participant: MALENI</p>
    </header>

    <main class="container">
        <h2>Interactive Assignment Planner</h2>
        <p class="subtitle">Dynamic Task Arrays & Event Observers</p>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter new assignment title or project target..." aria-label="Assignment Title">
            <button type="button" id="addTaskBtn">Add Assignment</button>
        </div>

        <ul id="taskList">
            </ul>
    </main>

    <script src="script.js"></script>
</body>
</html>
